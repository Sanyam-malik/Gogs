name: Sync Gogs Repository

on:
  workflow_dispatch:

jobs:
  sync-gh-pages:
    name: Sync Gogs Repository
    runs-on: ownubuntu

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push clean history to target repo
        uses: actions/forgejo/clean-sync@v1
        with:
          remote_url: https://github.com/Sanyam-malik/Gogs.git
          token: ${{ vars.GIT_TOKEN }}
          user_name: Sanyam-malik
          user_email: sanyammalik105@gmail.com